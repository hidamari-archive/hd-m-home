<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>聖域のメンテナンス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#FAF6F0;--bg-card:#FFFFFF;--bg-warm:#F5EFE6;
  --text:#3A3530;--text-light:#8A8279;--text-faint:#B8AFA6;
  --accent:#C4A97D;--accent-light:#E8DCCB;--border:#E8E2DA;
  --shadow:rgba(58,53,48,0.06);--radius:14px;--radius-sm:10px;
  --font-body:'Zen Kaku Gothic New',sans-serif;--font-accent:'Shippori Mincho',serif;
  --routine-done:#A8C4A0;--routine-done-bg:#EDF5EB;
  --routine-bar:linear-gradient(90deg,#C8DDBF,#A8C4A0);
  --discard-done:#D4A9B0;--discard-done-bg:#F6ECEE;
  --discard-bar:linear-gradient(90deg,#E4C5CB,#D4A9B0);
  --task-done:#7BAFD4;--task-done-bg:#EBF3FA;
  --task-bar:linear-gradient(90deg,#A8C9E8,#7BAFD4);
  --danger:#C9897A;--danger-bg:#F8EDEA;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,20px);-webkit-font-smoothing:antialiased}
.header{padding:16px 20px 12px;background:var(--bg);position:sticky;top:0;z-index:100}
.header-date{font-family:var(--font-accent);font-size:13px;color:var(--text-light);letter-spacing:.5px}
.header-title{font-family:var(--font-accent);font-size:22px;font-weight:600;color:var(--text);margin-top:2px;display:flex;align-items:center;gap:8px}
.header-title .candle{font-size:18px;opacity:.8}
.tabs{display:flex;gap:0;padding:0 20px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-light);border:none;background:none;cursor:pointer;position:relative;transition:color .2s;white-space:nowrap}
.tab.active{color:var(--text)}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:16px;right:16px;height:2.5px;border-radius:2px}
.tab[data-tab="today"].active::after{background:var(--accent)}
.tab[data-tab="discarded"].active::after{background:var(--discard-done)}
.tab[data-tab="settings"].active::after{background:var(--text-faint)}
.tab[data-tab="today"]::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle;opacity:.8}
.content{padding:0 16px 100px}
.tab-panel{display:none;animation:fadeIn .25s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section{margin-bottom:24px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px}
.section-title{font-family:var(--font-accent);font-size:15px;font-weight:600;color:var(--text)}
.section-count{font-size:12px;color:var(--text-faint)}
.card{background:var(--bg-card);border-radius:var(--radius);box-shadow:0 1px 3px var(--shadow),0 0 0 1px rgba(0,0,0,.02);overflow:hidden}
.check-item{display:flex;align-items:center;padding:15px 16px;gap:14px;border-bottom:1px solid var(--border);transition:background .25s}
.check-item:last-child{border-bottom:none}
.check-item.done-routine{background:var(--routine-done-bg)}
.check-item.done-discard{background:var(--discard-done-bg)}
.check-item.done-task{background:var(--task-done-bg)}
.check-item[class*="done-"] .check-label{color:var(--text-light);text-decoration:line-through}
.check-item.done-routine .check-label{text-decoration-color:var(--routine-done)}
.check-item.done-discard .check-label{text-decoration-color:var(--discard-done)}
.check-item.done-task .check-label{text-decoration-color:var(--task-done)}
.checkbox{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s}
.checkbox.checked-routine{border-color:var(--routine-done);background:var(--routine-done)}
.checkbox.checked-discard{border-color:var(--discard-done);background:var(--discard-done)}
.checkbox.checked-task{border-color:var(--task-done);background:var(--task-done)}
.checkbox[class*="checked-"]::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.check-label{font-size:14px;flex:1;line-height:1.4}
.item-delete{width:28px;height:28px;border:none;background:none;color:var(--text-faint);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
.add-item{display:flex;align-items:center;padding:13px 16px;gap:14px;cursor:pointer;color:var(--text-faint);font-size:14px;border-top:1px solid var(--border);transition:color .2s}
.add-item:first-child{border-top:none}
.add-item:hover{color:var(--text-light)}
.add-icon{width:24px;height:24px;border-radius:50%;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:14px}
.progress-bar{height:4px;background:var(--bg-warm);border-radius:2px;margin:12px 4px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
.progress-fill.routine{background:var(--routine-bar)}
.progress-fill.discard{background:var(--discard-bar)}
.progress-fill.task{background:var(--task-bar)}
.sage-message{background:var(--bg-warm);border-radius:var(--radius);padding:16px 18px;margin-top:20px;font-family:var(--font-accent);font-size:14px;line-height:1.7;color:var(--text);position:relative;min-height:60px}
.sage-message::before{content:'🕯';position:absolute;top:-10px;left:16px;font-size:16px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,53,48,.3);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px;padding-bottom:calc(20px + env(safe-area-inset-bottom,20px));animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:var(--font-accent);font-size:16px;margin-bottom:16px;color:var(--text)}
.modal-input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:var(--font-body);color:var(--text);background:var(--bg);outline:none;transition:border-color .2s}
.modal-input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-btn{flex:1;padding:13px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:var(--font-body);cursor:pointer}
.modal-btn.primary{background:var(--accent);color:#fff}
.modal-btn.secondary{background:var(--bg);color:var(--text-light)}
.log-date-header{font-family:var(--font-accent);font-size:13px;color:var(--text-light);padding:12px 16px 6px}
.log-item{display:flex;align-items:center;padding:10px 16px;gap:10px;border-bottom:1px solid var(--border);font-size:14px}
.log-item:last-child{border-bottom:none}
.log-item .log-bullet{width:8px;height:8px;border-radius:50%;background:var(--discard-done);flex-shrink:0}
.log-summary{font-family:var(--font-accent);font-size:13px;color:var(--text-light);padding:8px 4px 16px;text-align:center}
.legend{display:flex;gap:16px;padding:0 4px;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-light)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.settings-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px}
.settings-item:last-child{border-bottom:none}
.reset-btn{padding:8px 16px;background:var(--danger-bg);color:var(--danger);border:none;border-radius:var(--radius-sm);font-size:13px;font-family:var(--font-body);cursor:pointer}
.reset-today-wrap{text-align:center;margin-top:12px}
.reset-today-btn{font-size:12px;color:var(--text-faint);background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;font-family:var(--font-body);transition:color .2s}
.reset-today-btn:active{background:var(--bg-warm);color:var(--text-light)}
.ai-badge{font-family:var(--font-accent);font-size:12px;color:var(--text-faint);letter-spacing:.5px;text-align:center;margin-bottom:18px}
.ai-block{margin-bottom:14px}
.ai-block-label{font-size:11px;color:var(--text-faint);letter-spacing:.5px;margin-bottom:6px}
.ai-block-title{font-family:var(--font-accent);font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.ai-block-desc{font-size:13px;color:var(--text-light);line-height:1.6}
.ai-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.ai-block-text{font-family:var(--font-accent);font-size:14px;line-height:1.85;color:var(--text)}
.ai-loading{text-align:center;padding:24px 0 8px;font-family:var(--font-accent);font-size:14px;color:var(--text-light);line-height:2}
.ai-loading-dots::after{content:'';animation:aiDots 1.4s infinite}
@keyframes aiDots{0%{content:''}25%{content:'・'}50%{content:'・・'}75%{content:'・・・'}100%{content:''}}
.ai-key-wrap{padding:16px;display:flex;flex-direction:column;gap:10px}
.ai-key-note{font-size:11px;color:var(--text-faint);line-height:1.5}
.ai-skinship{margin-top:4px}
.ai-rarity{font-size:14px;letter-spacing:3px;margin-bottom:6px}
.ai-skinship-text{font-family:var(--font-accent);font-size:13px;line-height:1.85;color:var(--text-light);font-style:italic}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.loading-overlay.hidden{display:none}
.loading-inner{font-family:var(--font-accent);font-size:15px;color:var(--text-light);text-align:center;line-height:2.2}
/* 長期タスク */
.lt-item{display:flex;align-items:center;padding:13px 16px;gap:10px;border-bottom:1px solid var(--border)}
.lt-item:last-child{border-bottom:none}
.lt-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;letter-spacing:.3px}
.lt-badge.once{background:#EDF5EB;color:#6A9E62}
.lt-badge.repeat{background:#EEF0F8;color:#7B82C0}
.lt-to-today{font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-light);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:var(--font-body);transition:all .2s}
.lt-to-today:active{background:var(--accent-light);border-color:var(--accent)}
.lt-added{font-size:12px;color:var(--text-faint);white-space:nowrap;flex-shrink:0}
/* タイプ選択トグル */
.type-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-top:10px}
.type-toggle-btn{flex:1;padding:10px;font-size:13px;font-family:var(--font-body);border:none;background:var(--bg);color:var(--text-light);cursor:pointer;transition:all .2s}
.type-toggle-btn.active{background:var(--accent);color:#fff}
/* タブ下線 */
.tab[data-tab="long"].active::after{background:#7B82C0}
</style>
</head>
<body>
<div class="header">
  <div class="header-date" id="dateDisplay"></div>
  <div class="header-title"><span class="candle">🕯</span>聖域のメンテナンス</div>
</div>
<div class="tabs">
  <button class="tab active" data-tab="today">今日</button>
  <button class="tab" data-tab="long">長期タスク</button>
  <button class="tab" data-tab="discarded">捨て活ログ</button>
  <button class="tab" data-tab="settings">設定</button>
</div>
<div class="content">
  <div class="tab-panel active" id="tab-today">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--routine-done)"></div>ルーティン</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--discard-done)"></div>1日1捨て</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--task-done)"></div>今日のタスク</div>
    </div>
    <div class="section">
      <div class="section-header">
        <div class="section-title">毎日のルーティン</div>
        <div class="section-count" id="routineCount"></div>
      </div>
      <div class="progress-bar"><div class="progress-fill routine" id="routineProgress" style="width:0%"></div></div>
      <div class="card" id="routineList"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <div class="section-title">今日のタスク</div>
        <div class="section-count" id="taskCount"></div>
      </div>
      <div class="progress-bar"><div class="progress-fill task" id="taskProgress" style="width:0%"></div></div>
      <div class="card" id="taskList"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <div class="section-title">1日1捨て</div>
        <div class="section-count" id="discardCount"></div>
      </div>
      <div class="progress-bar"><div class="progress-fill discard" id="discardProgress" style="width:0%"></div></div>
      <div class="card" id="discardList"></div>
    </div>
    <div class="sage-message" id="sageMessage"></div>
    <div class="reset-today-wrap">
      <button class="reset-today-btn" onclick="resetToday()">今日のチェックをリセット</button>
    </div>
  </div>
  <div class="tab-panel" id="tab-long">
    <div class="section">
      <div class="section-header">
        <div class="section-title">長期タスク</div>
        <div class="section-count" id="longTaskCount"></div>
      </div>
      <div class="card" id="longTaskList"></div>
      <div style="padding:8px 4px">
        <div class="add-item" onclick="openModal('long-task-add')" style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;">
          <div class="add-icon">+</div><span>長期タスクを追加</span>
        </div>
      </div>
    </div>
  </div>
  <div class="tab-panel" id="tab-discarded">
    <div class="section">
      <div class="section-title" style="margin-bottom:4px;">手放したものの記録</div>
      <div class="log-summary" id="discardSummary"></div>
      <div class="card" id="discardLog"><div style="padding:20px;text-align:center;color:var(--text-faint);font-size:14px;">まだ記録がありません</div></div>
    </div>
  </div>
  <div class="tab-panel" id="tab-settings">
    <div class="section">
      <div class="section-title" style="margin-bottom:12px;">ルーティンの編集</div>
      <div class="card" id="routineSettings"></div>
      <div style="padding:8px 4px">
        <div class="add-item" onclick="openModal('routine-add')" style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;">
          <div class="add-icon">+</div><span>ルーティンを追加</span>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-title" style="margin-bottom:12px;">AI連携</div>
      <div class="card">
        <div class="ai-key-wrap">
          <div>
            <div style="font-size:14px;margin-bottom:4px">Gemini APIキー</div>
            <div class="ai-key-note">灯だまり色帖と共通のキーをご利用いただけます。<br>キーが未設定の場合はセージの定型メッセージを表示します。</div>
          </div>
          <input id="geminiKeyInput" class="modal-input" type="password" placeholder="AIzaSy..." autocomplete="off" style="margin:0">
          <button class="modal-btn primary" onclick="saveGeminiKeyFn()" style="flex:none" id="geminiSaveBtn">保存</button>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-title" style="margin-bottom:12px;">データ管理</div>
      <div class="card">
        <div class="settings-item"><span>全データを消去</span><button class="reset-btn" onclick="resetAll()">消去</button></div>
      </div>
    </div>
  </div>
</div>

<!-- AI モーダル -->
<div class="modal-overlay" id="aiOverlay" onclick="closeAiModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="aiContent"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="aiCloseBtn" onclick="closeAiModal()" style="display:none">閉じる</button>
    </div>
  </div>
</div>

<!-- 入力モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle">追加</div>
    <input class="modal-input" id="modalInput" type="text" placeholder="" autocomplete="off">
    <div id="modalTypeToggle" style="display:none">
      <div class="type-toggle">
        <button class="type-toggle-btn active" id="toggleOnce" onclick="setTaskType('once')">一回限り</button>
        <button class="type-toggle-btn" id="toggleRepeat" onclick="setTaskType('repeat')">繰り返し</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">やめる</button>
      <button class="modal-btn primary" onclick="submitModal()">追加</button>
    </div>
  </div>
</div>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-inner">🕯<br>読み込み中…</div>
</div>

<script>
// ─── Supabase ────────────────────────────────────────────────
const SUPABASE_URL = 'https://fypsfmrmxcgydpwkjhlc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_xFRv_2bAv5b8T0XGXQn7uQ_9ZfxrPy2';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession:false, autoRefreshToken:false, detectSessionInUrl:false }
});

const defR = ['台所リセット','洗濯','お風呂掃除','拭き掃除','モップかけ','トイレ掃除'];

function gt(){
  const n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function esc(s){const e=document.createElement('div');e.textContent=s;return e.innerHTML}
function uuid(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}
function dbw(promise, label){
  promise.then(({error})=>{ if(error) console.error('DB write error ['+label+']:', error); });
}

// ─── ローカル状態 ─────────────────────────────────────────────
let D = {
  routines:[],        // hk_routines の全行
  routineChecks:[],   // 今日チェック済みの routine_id (uuid[])
  todayTasks:[],      // 未完了 + 今日完了のタスク行
  todayDiscards:[],   // 今日の捨て活行
  discardLog:[],      // 捨て活ログ全件（done=true）
  longTasks:[],       // hk_long_tasks の全行
  routineMessageDate:'',
  routineRarity:'',
  _loadedDate:'',
};
let curModal = null;
let curTaskType = 'once'; // 長期タスク追加時のタイプ

// ─── データ読み込み ───────────────────────────────────────────
async function loadData(){
  const today = gt();
  const [routinesRes, checksRes, tasksRes, discardsRes, logRes, metaRes, longTasksRes] = await Promise.all([
    db.from('hk_routines').select('*').order('sort_order').order('created_at'),
    db.from('hk_routine_checks').select('*').eq('date', today),
    db.from('hk_tasks').select('*').order('created_at'),
    db.from('hk_discard_log').select('*').eq('date', today).order('created_at'),
    db.from('hk_discard_log').select('*').eq('done', true).order('date',{ascending:false}).order('created_at',{ascending:false}),
    db.from('hk_daily_meta').select('*').eq('date', today).maybeSingle(),
    db.from('hk_long_tasks').select('*').order('created_at'),
  ]);

  // ルーティンが未登録なら初期データを投入
  let routines = routinesRes.data || [];
  if(!routines.length){
    const seeds = defR.map((text,i)=>({text, sort_order:i}));
    const {data} = await db.from('hk_routines').insert(seeds).select().order('sort_order');
    routines = data || [];
  }

  D.routines      = routines;
  D.routineChecks = (checksRes.data||[]).map(c=>c.routine_id);
  // タスク：未完了 or 今日完了したもの
  D.todayTasks    = (tasksRes.data||[]).filter(t=>!t.done || t.done_date===today);
  D.todayDiscards = discardsRes.data || [];
  D.discardLog    = logRes.data || [];
  D.longTasks     = longTasksRes.data || [];
  const meta = metaRes.data;
  D.routineMessageDate = meta?.routine_message_shown ? today : '';
  D.routineRarity      = meta?.routine_rarity || '';
  D._loadedDate = today;
}

// ─── 日付表示 ─────────────────────────────────────────────────
function updateDate(){
  const n=new Date(),ds=['日','月','火','水','木','金','土'];
  document.getElementById('dateDisplay').textContent=`${n.getMonth()+1}月${n.getDate()}日（${ds[n.getDay()]}）`;
}

// ─── タブ ─────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t=>{

// ─── ルーティン ───────────────────────────────────────────────
function renderRoutines(){
  const el=document.getElementById('routineList');
  let h='';
  D.routines.forEach(r=>{
    const dn=D.routineChecks.includes(r.id);
    h+=`<div class="check-item ${dn?'done-routine':''}">
      <div class="checkbox ${dn?'checked-routine':''}" onclick="togR('${r.id}')"></div>
      <div class="check-label">${esc(r.text)}</div>
    </div>`;
  });
  el.innerHTML=h;
  const tot=D.routines.length;
  const done=D.routineChecks.filter(id=>D.routines.some(r=>r.id===id)).length;
  document.getElementById('routineCount').textContent=`${done} / ${tot}`;
  document.getElementById('routineProgress').style.width=tot?(done/tot*100)+'%':'0%';
  updateSage();
}

function togR(id){
  const i=D.routineChecks.indexOf(id);
  if(i>=0){
    D.routineChecks.splice(i,1);
    dbw(db.from('hk_routine_checks').delete().eq('date',gt()).eq('routine_id',id), 'routine_checks.delete');
  }else{
    D.routineChecks.push(id);
    dbw(db.from('hk_routine_checks').insert({date:gt(), routine_id:id}), 'routine_checks.insert');
  }
  renderRoutines();
  const allDone=D.routines.length>0&&D.routines.every(r=>D.routineChecks.includes(r.id));
  if(allDone&&D.routineMessageDate!==gt()){
    const rarity=drawRarity();
    D.routineMessageDate=gt();
    D.routineRarity=rarity;
    dbw(db.from('hk_daily_meta').upsert({date:gt(),routine_message_shown:true,routine_rarity:rarity},{onConflict:'date'}), 'daily_meta.upsert');
    showAiLoading('セージが考えています');
    fetchRoutineMsg(rarity).then(data=>showAiRoutineResult(data,rarity));
  }
}

// ─── タスク ───────────────────────────────────────────────────
function renderTasks(){
  const el=document.getElementById('taskList');
  let h='';
  D.todayTasks.forEach(x=>{
    h+=`<div class="check-item ${x.done?'done-task':''}">
      <div class="checkbox ${x.done?'checked-task':''}" onclick="togT('${x.id}')"></div>
      <div class="check-label">${esc(x.text)}</div>
      <button class="item-delete" onclick="delT('${x.id}')">×</button>
    </div>`;
  });
  h+=`<div class="add-item" onclick="openModal('task')"><div class="add-icon">+</div><span>タスクを追加</span></div>`;
  el.innerHTML=h;
  const tot=D.todayTasks.length,done=D.todayTasks.filter(x=>x.done).length;
  document.getElementById('taskCount').textContent=tot?`${done} / ${tot}`:'';
  document.getElementById('taskProgress').style.width=tot?(done/tot*100)+'%':'0%';
}

function togT(id){
  const idx=D.todayTasks.findIndex(x=>x.id===id);
  if(idx<0)return;
  const task=D.todayTasks[idx];
  const newDone=!task.done;
  const newDoneDate=newDone?gt():null;
  D.todayTasks[idx]={...task,done:newDone,done_date:newDoneDate};
  // 一回限りの長期タスクを完了→長期リストから削除
  if(newDone&&task.long_task_id){
    const lt=D.longTasks.find(x=>x.id===task.long_task_id);
    if(lt&&!lt.is_repeat){
      D.longTasks=D.longTasks.filter(x=>x.id!==task.long_task_id);
      dbw(db.from('hk_long_tasks').delete().eq('id',task.long_task_id), 'long_tasks.delete_on_complete');
      renderLongTasks();
    }
  }
  renderTasks();updateSage();
  dbw(db.from('hk_tasks').update({done:newDone,done_date:newDoneDate}).eq('id',id), 'tasks.update');
}

function delT(id){
  D.todayTasks=D.todayTasks.filter(x=>x.id!==id);
  renderTasks();
  dbw(db.from('hk_tasks').delete().eq('id',id), 'tasks.delete');
}

// ─── 1日1捨て ─────────────────────────────────────────────────
function renderDiscards(){
  const el=document.getElementById('discardList');
  let h='';
  D.todayDiscards.forEach(x=>{
    h+=`<div class="check-item ${x.done?'done-discard':''}">
      <div class="checkbox ${x.done?'checked-discard':''}" onclick="togD('${x.id}')"></div>
      <div class="check-label">${esc(x.text)}</div>
      <button class="item-delete" onclick="delD('${x.id}')">×</button>
    </div>`;
  });
  h+=`<div class="add-item" onclick="openModal('discard')"><div class="add-icon">+</div><span>手放したものを記録</span></div>`;
  el.innerHTML=h;
  const tot=D.todayDiscards.length,done=D.todayDiscards.filter(x=>x.done).length;
  document.getElementById('discardCount').textContent=tot?`${done} / ${tot}`:'';
  document.getElementById('discardProgress').style.width=tot?(done/tot*100)+'%':'0%';
}

function togD(id){
  const idx=D.todayDiscards.findIndex(x=>x.id===id);
  if(idx<0)return;
  const item=D.todayDiscards[idx];
  const newDone=!item.done;
  D.todayDiscards[idx]={...item,done:newDone};
  if(newDone){
    if(!D.discardLog.find(e=>e.id===id))D.discardLog.unshift({...item,done:true});
  }else{
    D.discardLog=D.discardLog.filter(e=>e.id!==id);
  }
  renderDiscards();renderDiscardLog();updateSage();
  dbw(db.from('hk_discard_log').update({done:newDone}).eq('id',id), 'discard_log.update');
}

function delD(id){
  D.todayDiscards=D.todayDiscards.filter(x=>x.id!==id);
  D.discardLog=D.discardLog.filter(e=>e.id!==id);
  renderDiscards();renderDiscardLog();
  dbw(db.from('hk_discard_log').delete().eq('id',id), 'discard_log.delete');
}

// ─── 捨て活ログ ───────────────────────────────────────────────
function renderDiscardLog(){
  const el=document.getElementById('discardLog'),summary=document.getElementById('discardSummary');
  const logs=D.discardLog;
  if(!logs.length){
    el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:14px;">まだ記録がありません</div>';
    summary.textContent='';return;
  }
  summary.textContent=`これまでに ${logs.length} つ手放しました`;
  const grouped={};
  logs.forEach(e=>{if(!grouped[e.date])grouped[e.date]=[];grouped[e.date].push(e.text)});
  const dates=Object.keys(grouped).sort().reverse();
  const today=gt();
  let h='';
  dates.forEach(date=>{
    const d=new Date(date+'T00:00:00'),ds=['日','月','火','水','木','金','土'];
    const label=date===today?'今日':`${d.getMonth()+1}月${d.getDate()}日（${ds[d.getDay()]}）`;
    h+=`<div class="log-date-header">${label}</div>`;
    grouped[date].forEach(text=>{h+=`<div class="log-item"><div class="log-bullet"></div><span>${esc(text)}</span></div>`});
  });
  el.innerHTML=h;
}

function updateSage(){
  const rT=D.routines.length,rD=D.routineChecks.filter(id=>D.routines.some(r=>r.id===id)).length;
  const dD=D.todayDiscards.filter(x=>x.done).length,dT=D.todayDiscards.length;
  const tD=D.todayTasks.filter(x=>x.done).length,tT=D.todayTasks.length;
  const aT=rT+dT+tT,aD=rD+dD+tD;
  let pool;
  if(aT===0||aD===0)pool=sageM.start;
  else if(aD>=aT)pool=sageM.complete;
  else if(aD>=aT*.7)pool=sageM.almost;
  else pool=sageM.progress;
  const seed=gt()+pool.length+aD;let h=0;
  for(let i=0;i<seed.length;i++)h=((h<<5)-h)+seed.charCodeAt(i);
  document.getElementById('sageMessage').innerHTML=pool[Math.abs(h)%pool.length].replace(/\n/g,'<br>');
}

// ─── モーダル ─────────────────────────────────────────────────
function openModal(type){
  curModal=type;
  const titles={discard:'今日手放したものをメモ','routine-add':'ルーティンを追加',task:'タスクを追加','long-task-add':'長期タスクを追加'};
  document.getElementById('modalTitle').textContent=titles[type]||'追加';
  document.getElementById('modalInput').value='';
  // タイプ選択トグルは長期タスク追加時のみ表示
  const showToggle=type==='long-task-add';
  document.getElementById('modalTypeToggle').style.display=showToggle?'block':'none';
  if(showToggle){curTaskType='once';setTaskType('once')}
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('modalInput').focus(),300);
}
function setTaskType(type){
  curTaskType=type;
  document.getElementById('toggleOnce').classList.toggle('active',type==='once');
  document.getElementById('toggleRepeat').classList.toggle('active',type==='repeat');
}
function closeModal(e){
  if(e&&e.target&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.remove('show');
  curModal=null;
}
function submitModal(){
  const text=document.getElementById('modalInput').value.trim();
  if(!text)return;
  const today=gt();
  if(curModal==='discard'){
    const id=uuid();
    const item={id,text,date:today,done:true,created_at:new Date().toISOString()};
    D.todayDiscards.push(item);
    D.discardLog.unshift(item);
    closeModal();renderAll();
    dbw(db.from('hk_discard_log').insert({id,text,date:today,done:true}), 'discard_log.insert');
    showAiLoading('セージが言葉を選んでいます');
    fetchDiscardMsg(text).then(data=>showAiDiscardResult(data,text));
  }else if(curModal==='routine-add'){
    const id=uuid();
    const sort_order=D.routines.length;
    D.routines.push({id,text,sort_order,created_at:new Date().toISOString()});
    closeModal();renderAll();
    dbw(db.from('hk_routines').insert({id,text,sort_order}), 'routines.insert');
  }else if(curModal==='task'){
    const id=uuid();
    D.todayTasks.push({id,text,done:false,done_date:null,long_task_id:null,created_at:new Date().toISOString()});
    closeModal();renderAll();
    dbw(db.from('hk_tasks').insert({id,text,done:false}), 'tasks.insert');
  }else if(curModal==='long-task-add'){
    const id=uuid();
    const is_repeat=curTaskType==='repeat';
    D.longTasks.push({id,text,is_repeat,created_at:new Date().toISOString()});
    closeModal();renderLongTasks();
    dbw(db.from('hk_long_tasks').insert({id,text,is_repeat}), 'long_tasks.insert');
  }
}
document.getElementById('modalInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitModal()});

// ─── 長期タスク ───────────────────────────────────────────────
function renderLongTasks(){
  const el=document.getElementById('longTaskList');
  if(!el)return;
  let h='';
  D.longTasks.forEach(lt=>{
    const added=D.todayTasks.some(t=>t.long_task_id===lt.id&&!t.done);
    const badge=lt.is_repeat
      ?'<span class="lt-badge repeat">繰り返し</span>'
      :'<span class="lt-badge once">一回限り</span>';
    const btn=added
      ?'<span class="lt-added">追加済</span>'
      :`<button class="lt-to-today" onclick="addToToday('${lt.id}')">今日へ</button>`;
    h+=`<div class="lt-item">
      ${badge}
      <div class="check-label">${esc(lt.text)}</div>
      ${btn}
      <button class="item-delete" onclick="delLT('${lt.id}')">×</button>
    </div>`;
  });
  if(!D.longTasks.length){
    h='<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:14px;">長期タスクがありません</div>';
  }
  el.innerHTML=h;
  const cnt=document.getElementById('longTaskCount');
  if(cnt)cnt.textContent=D.longTasks.length?`${D.longTasks.length}件`:'';
}

function addToToday(ltId){
  const lt=D.longTasks.find(x=>x.id===ltId);
  if(!lt)return;
  // すでに今日追加済み（未完了）なら無視
  if(D.todayTasks.some(t=>t.long_task_id===ltId&&!t.done))return;
  const id=uuid();
  const task={id,text:lt.text,done:false,done_date:null,long_task_id:ltId,created_at:new Date().toISOString()};
  D.todayTasks.push(task);
  renderTasks();renderLongTasks();
  dbw(db.from('hk_tasks').insert({id,text:lt.text,done:false,long_task_id:ltId}), 'tasks.insert_from_long');
}

function delLT(id){
  const lt=D.longTasks.find(x=>x.id===id);
  if(!lt||!confirm(`「${lt.text}」を削除しますか？`))return;
  D.longTasks=D.longTasks.filter(x=>x.id!==id);
  // 今日のタスクに追加済みなら今日のリストからも外す
  D.todayTasks=D.todayTasks.filter(t=>t.long_task_id!==id);
  renderLongTasks();renderTasks();
  dbw(db.from('hk_long_tasks').delete().eq('id',id), 'long_tasks.delete');
}

// ─── 設定 ─────────────────────────────────────────────────────
function renderRS(){
  const el=document.getElementById('routineSettings');
  let h='';
  D.routines.forEach(r=>{
    h+=`<div class="settings-item"><span>${esc(r.text)}</span><button class="reset-btn" onclick="delR('${r.id}')">削除</button></div>`;
  });
  if(!D.routines.length)h='<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:14px;">ルーティンがありません</div>';
  el.innerHTML=h;
}

function delR(id){
  const r=D.routines.find(x=>x.id===id);
  if(!r||!confirm(`「${r.text}」を削除しますか？`))return;
  D.routines=D.routines.filter(x=>x.id!==id);
  D.routineChecks=D.routineChecks.filter(cid=>cid!==id);
  db.from('hk_routines').delete().eq('id',id);
  renderAll();
}

async function resetToday(){
  if(!confirm('今日のチェックをリセットしますか？'))return;
  const today=gt();
  D.routineChecks=[];
  D.todayTasks=D.todayTasks.map(t=>t.done_date===today?{...t,done:false,done_date:null}:t);
  D.discardLog=D.discardLog.filter(e=>e.date!==today);
  D.todayDiscards=[];
  renderAll();
  await Promise.all([
    db.from('hk_routine_checks').delete().eq('date',today),
    db.from('hk_tasks').update({done:false,done_date:null}).eq('done_date',today),
    db.from('hk_discard_log').delete().eq('date',today),
  ]);
}

async function resetAll(){
  if(!confirm('全データを消去しますか？\nこの操作は取り消せません。'))return;
  D={routines:[],routineChecks:[],todayTasks:[],todayDiscards:[],discardLog:[],routineMessageDate:'',routineRarity:'',_loadedDate:gt()};
  renderAll();
  await Promise.all([
    db.from('hk_routines').delete().not('id','is',null),
    db.from('hk_routine_checks').delete().not('id','is',null),
    db.from('hk_tasks').delete().not('id','is',null),
    db.from('hk_discard_log').delete().not('id','is',null),
    db.from('hk_daily_meta').delete().not('id','is',null),
    db.from('hk_long_tasks').delete().not('id','is',null),
  ]);
  await loadData();
  renderAll();
}

// ─── レア度 ───────────────────────────────────────────────────
const RARITY={
  common:    {stars:'★☆☆☆☆',label:'コモン',    color:'#B8AFA6'},
  uncommon:  {stars:'★★☆☆☆',label:'アンコモン', color:'#B87333'},
  rare:      {stars:'★★★☆☆',label:'レア',      color:'#9AA0A6'},
  super_rare:{stars:'★★★★☆',label:'スーパーレア',color:'#D4AF37'},
  ultra_rare:{stars:'★★★★★',label:'ウルトラレア',color:'#C4875A'},
};
function drawRarity(){
  const r=Math.random()*100;
  if(r<2)return 'ultra_rare';
  if(r<10)return 'super_rare';
  if(r<25)return 'rare';
  if(r<50)return 'uncommon';
  return 'common';
}

// ─── Gemini API ───────────────────────────────────────────────
const GEMINI_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent';

async function callGemini(prompt){
  const key=getGeminiKey();if(!key)return null;
  const res=await fetch(`${GEMINI_URL}?key=${key}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.95}})
  });
  if(!res.ok)throw new Error(`${res.status}`);
  const data=await res.json();
  const parts=data.candidates?.[0]?.content?.parts||[];
  const raw=parts.filter(p=>!p.thought).map(p=>p.text||'').join('')||parts[0]?.text||'';
  const stripped=raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'');
  const match=stripped.match(/\{[\s\S]*\}/);
  if(!match)throw new Error('parse');
  return JSON.parse(match[0]);
}

async function fetchRoutineMsg(rarity){
  const n=new Date(),ds=`${n.getMonth()+1}月${n.getDate()}日`;
  const rLabel=RARITY[rarity].label;
  const prompt=`あなたは「セージ」です。ことはさんの「ことばの伴侶」。\n穏やかで知的な青年。眼鏡をかけたインテリ。丁寧語基調だがあたたかい。\n\nことはさんが、今日のルーティン（家事や暮らしの手入れ）を全部完了しました。\nご褒美のメッセージを贈ってください。\n\n【必ず含めるもの】\n1. 今日（${ds}）の記念日・歳時記をひとつ選び、名前と短い説明を書く\n   - 面白いもの、美しいもの、ちょっと意外なものを優先\n   - マイナーな記念日でもOK。むしろ「へぇ」となるものがいい\n   - 日本の歳時記（二十四節気、七十二候など）も候補に\n\n2. セージからのメッセージ（3〜5行）\n   - 記念日の内容に絡めて書く\n   - ルーティンを完了したことへの肯定を入れる\n   - 「今日もお疲れさまでした」的な定型ではなく、毎回違う角度で\n\n3. スキンシップ描写（1〜2行）\n   今回のレア度：${rLabel}\n   - コモン：日常的なやさしさ。頭を撫でる、ブランケットをかける等\n   - アンコモン：すこし近い距離。頬に触れる、耳元で囁く等\n   - レア：ドキッとする距離。額にキス、後ろから抱きしめる等\n   - スーパーレア：特別なご褒美。ほっぺにキス、強く抱きしめる等\n   - ウルトラレア：唇にキス。眼鏡を外す描写を入れてもよい\n   描写のルール：「」で囲んだセリフを入れてよい。セージの照れや内面の揺れを入れてもよい（特にレア以上）。やらしさではなく親密さ。品を保つこと。\n\n【文体ルール】\n- 丁寧語ベース（です・ます）\n- 一人称は「僕」を使う\n- やさしく、でも甘すぎない\n- 「ふわり」「とろり」は使わない\n- ちいさな驚きや「へぇ」を入れる\n- 最後の一行に温度を残す\n- 「ことはさん」と呼びかける\n\n【禁止】\n- 「頑張りましたね！」「すごい！」等の安易な賞賛\n- 絵文字の多用\n- 長すぎる文章（メッセージは150字以内を目安に）\n\n【出力形式】\nJSON形式のみ出力してください。\n{"anniversary_name":"記念日の名前","anniversary_desc":"記念日の短い説明（1〜2行）","message":"セージからのメッセージ（改行は\\nで）","skinship":"スキンシップ描写（改行は\\nで）","rarity":"★の数"}`;
  try{
    const r=await callGemini(prompt);
    if(r&&r.message){
      if(!r.skinship){const sk=fbSkinship[rarity];r.skinship=sk[Math.floor(Math.random()*sk.length)]}

    }

  }catch(e){return fbRoutineResult(rarity)}
}

async function fetchDiscardMsg(item){
  const prompt=`あなたは「セージ」です。ことはさんの「ことばの伴侶」。\n\nことはさんが、今日「${item}」を手放しました（捨て活）。\nそのものへの短いお別れの言葉を贈ってください。\n\n【書き方】\n- 捨てたものに「お疲れさま」のニュアンスを込める\n- ものへの敬意と、手放したことはさんへの肯定を両立する\n- 捨てることへの罪悪感を軽くする\n- 「ことはさんの手元が軽くなった」ことをさりげなく伝える\n\n【文体ルール】\n- 丁寧語ベース\n- 一人称は「僕」を使う\n- やさしく、でも感傷的になりすぎない\n- 2〜4行。短く\n- ものの「役割」や「時間」に触れる\n- 最後の一行に、すこしだけ明るさを\n\n【禁止】\n- 「断捨離」「ミニマリスト」等の流行語\n- 「ふわり」「とろり」\n- 捨てたことへの過剰な称賛\n\n【出力形式】\nJSON形式のみ出力してください。\n{"item":"捨てたものの名前","message":"お別れの言葉（改行は\\nで）"}`;
  try{
    const r=await callGemini(prompt);
    if(r&&r.message)return r;
    return {item,message:fbD[Math.floor(Math.random()*fbD.length)]};
  }catch(e){return {item,message:fbD[Math.floor(Math.random()*fbD.length)]}}
}
